<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>资料管理后台</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #f4f7f6; color: #172322; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    button, input, textarea, select { font: inherit; }
    button { border: 0; cursor: pointer; }
    .wrap { max-width: 1180px; margin: 0 auto; padding: 24px; }
    .login { max-width: 380px; margin: 12vh auto; padding: 24px; border-radius: 8px; background: #fff; box-shadow: 0 8px 28px rgba(39,63,60,.1); }
    .login h1, .top h1 { margin: 0; font-size: 24px; }
    .hint { margin-top: 8px; color: #697a77; font-size: 14px; line-height: 1.5; }
    .server-warning { margin-top: 12px; padding: 10px 12px; border-radius: 8px; background: #fff0e7; color: #9b3d2f; font-size: 13px; line-height: 1.55; font-weight: 800; }
    .row { display: flex; gap: 12px; align-items: center; }
    .top { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 18px; }
    .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .tab, .btn { padding: 10px 14px; border-radius: 8px; background: #fff; color: #172322; font-weight: 800; box-shadow: 0 4px 14px rgba(39,63,60,.08); }
    .tab.active, .primary { background: #b94438; color: #fff; }
    .ghost { background: #e9f3f1; color: #1f5f5b; }
    .danger { background: #fff0e7; color: #b94438; }
    .grid { display: grid; grid-template-columns: 320px 1fr; gap: 16px; align-items: start; }
    .panel { border-radius: 8px; background: #fff; padding: 18px; box-shadow: 0 8px 28px rgba(39,63,60,.08); }
    .list { display: flex; flex-direction: column; gap: 8px; max-height: 72vh; overflow: auto; }
    .item { width: 100%; padding: 12px; border-radius: 8px; background: #f8faf9; text-align: left; color: #172322; }
    .item.active { background: #fff0e7; outline: 2px solid #d88435; }
    .item strong { display: block; }
    .item span { display: block; margin-top: 4px; color: #697a77; font-size: 13px; }
    label { display: block; margin-top: 12px; font-size: 13px; color: #596966; font-weight: 800; }
    input, textarea, select { width: 100%; margin-top: 6px; padding: 10px 11px; border: 1px solid #dfe8e6; border-radius: 8px; background: #fff; color: #172322; }
    input[type="file"] { padding: 8px; background: #f8faf9; }
    textarea { min-height: 92px; resize: vertical; }
    .upload-box { margin-top: 12px; padding: 14px; border: 1px dashed #cbd9d6; border-radius: 8px; background: #f8faf9; }
    .upload-box.dragover { border-color: #b94438; background: #fff8ef; }
    .upload-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .upload-title { font-size: 13px; color: #596966; font-weight: 900; }
    .upload-status { font-size: 12px; color: #8a6a36; }
    .upload-body { margin-top: 10px; display: grid; grid-template-columns: 120px 1fr; gap: 12px; align-items: center; }
    .upload-preview { width: 120px; height: 86px; border-radius: 8px; background: #edf3f1; color: #697a77; display: flex; align-items: center; justify-content: center; overflow: hidden; font-size: 13px; text-align: center; }
    .upload-preview img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .upload-help { color: #697a77; font-size: 13px; line-height: 1.5; }
    .upload-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .upload-actions .btn { box-shadow: none; }
    .upload-file { display: none; }
    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 0 12px; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
    .subhead { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin: 18px 0 8px; }
    .subhead h3 { margin: 0; font-size: 18px; }
    .admin-search { margin: 0 0 12px; }
    details.fold { margin-top: 12px; border: 1px solid #edf3f1; border-radius: 8px; background: #fff; overflow: hidden; }
    details.fold > summary { padding: 12px 14px; list-style: none; cursor: pointer; font-weight: 900; color: #172322; background: #f8faf9; display: flex; align-items: center; justify-content: space-between; }
    details.fold > summary::-webkit-details-marker { display: none; }
    details.fold > summary::after { content: "展开"; font-size: 12px; color: #1f5f5b; }
    details.fold[open] > summary::after { content: "收起"; }
    .fold-body { padding: 0 14px 14px; }
    .price-row { display: grid; grid-template-columns: 88px 78px 70px 1fr 1.25fr auto; gap: 8px; align-items: end; margin-top: 8px; }
    .price-image-cell .upload-box { width: 70px; margin-top: 0; padding: 5px; }
    .price-image-cell .upload-top { display: none; }
    .price-image-cell .upload-body { margin-top: 0; display: block; }
    .price-image-cell .upload-preview { width: 58px; height: 58px; aspect-ratio: 1 / 1; margin: 0 auto; font-size: 11px; }
    .price-image-cell .upload-help { display: none; }
    .price-image-cell .upload-actions { justify-content: center; margin-top: 5px; }
    .price-image-cell .upload-actions .btn { padding: 4px 6px; font-size: 11px; }
    .detail-builder { margin-top: 10px; display: flex; flex-direction: column; gap: 10px; }
    .detail-block { padding: 12px; border: 1px solid #edf3f1; border-radius: 8px; background: #f8faf9; }
    .detail-block-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
    .detail-block-title { font-size: 13px; font-weight: 900; color: #596966; }
    .mini-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .mini-actions .btn { padding: 7px 9px; box-shadow: none; font-size: 12px; }
    .quick-add { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; margin-bottom: 12px; }
    .quick-add .btn { width: 100%; box-shadow: none; padding: 11px 8px; }
    .editor-title { margin: 0 0 12px; padding-bottom: 12px; border-bottom: 1px solid #edf3f1; }
    .editor-title h2 { margin: 0; font-size: 22px; }
    .editor-title span { display: block; margin-top: 5px; color: #697a77; font-size: 13px; }
    .rich-editor { margin-top: 10px; border: 1px solid #dfe8e6; border-radius: 8px; background: #fff; overflow: hidden; }
    .rich-toolbar { display: flex; gap: 8px; padding: 10px; border-bottom: 1px solid #edf3f1; background: #f8faf9; }
    .rich-toolbar .btn { box-shadow: none; padding: 8px 10px; }
    .rich-area { min-height: 360px; padding: 14px; outline: none; font-size: 14px; line-height: 1.75; color: #172322; }
    .rich-area:empty::before { content: "在这里填写图文详情，可直接输入文字，也可以插入多张图片。"; color: #9aa8a5; }
    .rich-area img { max-width: 100%; height: auto; display: block; margin: 10px auto; border-radius: 8px; }
    .rich-file { display: none; }
    .bottom-save { position: sticky; bottom: 0; margin-top: 18px; padding: 14px 0 0; background: linear-gradient(180deg, rgba(255,255,255,0), #fff 34%); display: flex; justify-content: flex-end; }
    .bottom-save .btn { min-width: 150px; }
    .quick-panel { display: grid; grid-template-columns: minmax(0, 1fr) 340px; gap: 16px; align-items: start; }
    .quick-card { border-radius: 8px; background: #fff; padding: 18px; box-shadow: 0 8px 28px rgba(39,63,60,.08); }
    .quick-summary { position: sticky; top: 14px; }
    .summary-line { display: flex; justify-content: space-between; gap: 12px; padding: 10px 0; border-bottom: 1px solid #edf3f1; color: #596966; font-size: 13px; }
    .summary-line strong { color: #172322; text-align: right; }
    .toast { position: fixed; right: 18px; bottom: 18px; padding: 12px 14px; border-radius: 8px; background: #172322; color: #fff; display: none; }
    .hidden { display: none; }
    @media (max-width: 820px) {
      .wrap { padding: 14px; }
      .grid { grid-template-columns: 1fr; }
      .quick-panel { grid-template-columns: 1fr; }
      .form-grid, .price-row, .upload-body { grid-template-columns: 1fr; }
      .top { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <div id="login" class="login">
    <h1>资料管理后台</h1>
    <p class="hint">默认密码是 admin123，上云后请用环境变量 ADMIN_PASSWORD 改成强密码。</p>
    <div id="fileWarningLogin" class="server-warning hidden">请先双击 start.bat 启动本地服务，再用 http://localhost:3000/admin.html 打开后台。直接打开文件时，登录、保存和图片上传都不能正常工作。</div>
    <label>后台密码</label>
    <input id="password" type="password" placeholder="请输入密码">
    <div class="actions">
      <button class="btn primary" id="loginBtn">登录</button>
      <a class="btn ghost" href="/" target="_blank">打开前台</a>
    </div>
  </div>

  <div id="app" class="wrap hidden">
    <div class="top">
      <div>
        <h1>资料管理后台</h1>
        <div class="hint">日常新增产品用“快速录入”，需要改背景图、学校介绍或删除资料时再进“详细设置”。</div>
        <div id="fileWarningApp" class="server-warning hidden">当前是文件预览模式，图片上传和保存会失败。请使用 http://localhost:3000/admin.html 打开后台。</div>
      </div>
      <div class="row">
        <a class="btn ghost" href="/" target="_blank">预览前台</a>
        <button class="btn primary" id="saveBtn">保存全部</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="quick">快速录入</button>
      <button class="tab" data-tab="org">基础信息</button>
      <button class="tab" data-tab="teachers">学历规划师</button>
      <button class="tab" data-tab="media">新媒体账号</button>
      <button class="tab" data-tab="catalog">详细设置</button>
    </div>

    <div id="content"></div>
  </div>
  <div id="toast" class="toast"></div>

  <script>
    let token = localStorage.getItem("adminToken") || "";
    let site = null;
    let tab = "quick";
    let selected = { teacher: 0, media: 0, category: 0, school: 0, major: 0 };
    let catalogSearch = "";

    const $ = (selector) => document.querySelector(selector);
    const content = $("#content");
    const toast = $("#toast");
    const uid = (prefix) => `${prefix}-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 6)}`;
    const split = (value) => String(value || "").split(/[，,]/).map((item) => item.trim()).filter(Boolean);
    let activeUploadBox = null;

    function showToast(text) {
      toast.textContent = text;
      toast.style.display = "block";
      setTimeout(() => { toast.style.display = "none"; }, 1800);
    }

    async function api(url, options = {}) {
      const res = await fetch(url, {
        ...options,
        headers: {
          "Content-Type": "application/json",
          ...(token ? { Authorization: `Bearer ${token}` } : {}),
          ...(options.headers || {})
        }
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || "请求失败");
      return data;
    }

    async function uploadImage(file) {
      if (location.protocol === "file:") throw new Error("请先双击 start.bat，再用 http://localhost:3000/admin.html 打开后台上传图片");
      if (!token) throw new Error("请先登录后台，再上传图片");
      if (!file.type.startsWith("image/")) throw new Error("只能上传图片文件");
      if (file.size > 4 * 1024 * 1024) throw new Error("图片不能超过 4MB");
      const form = new FormData();
      form.append("file", file);
      const res = await fetch("/api/admin/upload", {
        method: "POST",
        headers: token ? { Authorization: `Bearer ${token}` } : {},
        body: form
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || "上传失败");
      return data.url;
    }

    function formatSize(bytes) {
      if (!bytes) return "";
      if (bytes < 1024 * 1024) return `${Math.round(bytes / 1024)}KB`;
      return `${(bytes / 1024 / 1024).toFixed(2)}MB`;
    }

    function imageBox(field, title, value, objectKey = "", sizeText = "建议图片宽 750px，高 420px，单张不超过 4MB。", extraAttr = "") {
      const preview = value ? `<img src="${value}" alt="">` : "暂无图片";
      const objectAttr = objectKey ? ` data-image-object="${objectKey}"` : "";
      return `<div class="upload-box" data-image-field="${field}"${objectAttr}${extraAttr} tabindex="0">
        <div class="upload-top">
          <span class="upload-title">${title}</span>
          <span class="upload-status">${value ? "已设置图片" : "未上传"}</span>
        </div>
        <div class="upload-body">
          <div class="upload-preview">${preview}</div>
          <div>
            <div class="upload-help">${sizeText} 支持 JPG、PNG、WebP、GIF、SVG。可点击选择、拖入图片，或复制图片后在后台页面直接粘贴。</div>
            <div class="upload-actions">
              <button class="btn ghost" type="button" data-upload-pick>选择图片</button>
              ${value ? `<button class="btn danger" type="button" data-upload-clear>清除图片</button>` : ""}
            </div>
          </div>
        </div>
        <input class="upload-file" type="file" accept="image/*">
      </div>`;
    }

    function bindImageBoxes(root, resolver) {
      root.querySelectorAll(".upload-box").forEach((box) => {
        box.__target = resolver(box);
        const input = box.querySelector(".upload-file");
        const status = box.querySelector(".upload-status");
        const preview = box.querySelector(".upload-preview");
        const field = box.dataset.imageField;
        const target = () => box.__target || resolver(box);

        async function handleFile(file) {
          if (!file) return;
          status.textContent = `正在上传 ${formatSize(file.size)}...`;
          try {
            const url = await uploadImage(file);
            target()[field] = url;
            preview.innerHTML = `<img src="${url}" alt="">`;
            status.textContent = `已上传 ${formatSize(file.size)}，请点右上角保存全部`;
            showToast("图片已上传，记得保存全部");
          } catch (error) {
            status.textContent = error.message || "上传失败";
            showToast(error.message);
          }
        }

        box.onclick = (event) => {
          activeUploadBox = box;
          if (event.target.closest("[data-upload-clear]")) {
            target()[field] = "";
            render();
            return;
          }
          if (event.target.closest("[data-upload-pick]")) input.click();
        };
        box.onfocus = () => { activeUploadBox = box; };
        input.onchange = () => handleFile(input.files?.[0]);
        box.ondragover = (event) => {
          event.preventDefault();
          activeUploadBox = box;
          box.classList.add("dragover");
          status.textContent = "松开即可上传";
        };
        box.ondragleave = () => {
          box.classList.remove("dragover");
          status.textContent = target()[field] ? "已设置图片" : "未上传";
        };
        box.ondrop = (event) => {
          event.preventDefault();
          box.classList.remove("dragover");
          handleFile(event.dataTransfer.files?.[0]);
        };
      });
    }

    document.addEventListener("paste", (event) => {
      if (!activeUploadBox) return;
      const file = Array.from(event.clipboardData?.files || []).find((item) => item.type.startsWith("image/"));
      if (!file) return;
      event.preventDefault();
      activeUploadBox.querySelector(".upload-file").dispatchEvent(new Event("focus"));
      const status = activeUploadBox.querySelector(".upload-status");
      status.textContent = "正在粘贴上传...";
      const field = activeUploadBox.dataset.imageField;
      const objectKey = activeUploadBox.dataset.imageObject;
      const target = objectKey === "school" ? (site.categories[selected.category].schools[selected.school]) : objectKey === "majorDetail" ? (site.categories[selected.category].schools[selected.school].majors[selected.major].detailBlocks[Number(activeUploadBox.dataset.blockIndex)]) : objectKey === "major" ? (site.categories[selected.category].schools[selected.school].majors[selected.major]) : objectKey === "price" ? (site.categories[selected.category].schools[selected.school].majors[selected.major].prices[Number(activeUploadBox.dataset.priceIndex)]) : objectKey === "category" ? site.categories[selected.category] : activeUploadBox.__target;
      uploadImage(file).then((url) => {
        target[field] = url;
        showToast("粘贴图片已上传，记得保存全部");
        render();
      }).catch((error) => showToast(error.message));
    });

    async function login() {
      try {
        const data = await api("/api/admin/login", {
          method: "POST",
          body: JSON.stringify({ password: $("#password").value })
        });
        token = data.token;
        localStorage.setItem("adminToken", token);
        await load();
      } catch (error) {
        showToast(error.message);
      }
    }

    async function load() {
      try {
        site = await api("/api/admin/site");
        $("#login").classList.add("hidden");
        $("#app").classList.remove("hidden");
        render();
      } catch {
        $("#login").classList.remove("hidden");
        $("#app").classList.add("hidden");
      }
    }

    async function save() {
      try {
        await api("/api/admin/site", { method: "PUT", body: JSON.stringify(site) });
        showToast("已保存");
        render();
      } catch (error) {
        showToast(error.message);
      }
    }

    function bindInputs(root, object, fields) {
      fields.forEach((field) => {
        const input = root.querySelector(`[data-field="${field}"]`);
        if (!input) return;
        input.value = Array.isArray(object[field]) ? object[field].join("，") : (object[field] || "");
        input.oninput = () => {
          object[field] = input.dataset.array === "true" ? split(input.value) : input.value;
        };
      });
    }

    function list(items, selectedIndex, key, keyword = "") {
      const q = keyword.trim().toLowerCase();
      const rows = (items || []).map((item, index) => ({ item, index })).filter(({ item }) => {
        if (!q) return true;
        const text = [item.name, item.title, item.id, item.desc, item.intro, item.tag].join(" ").toLowerCase();
        return text.includes(q);
      });
      if (!rows.length) return `<div class="empty">没有找到匹配资料</div>`;
      return `<div class="list">${rows.map(({ item, index }) => `<button class="item ${index === selectedIndex ? "active" : ""}" data-pick="${key}" data-index="${index}"><strong>${item.name || item.title || item.id}</strong><span>${item.desc || item.intro || item.title || ""}</span></button>`).join("")}</div>`;
    }

    function ensureMajorDetailBlocks(major) {
      if (!major) return;
      if (Array.isArray(major.detailBlocks)) return;
      major.detailBlocks = [];
      if (major.detail) major.detailBlocks.push({ type: "text", text: major.detail });
      if (major.detailImageUrl) major.detailBlocks.push({ type: "image", url: major.detailImageUrl });
    }

    function renderMajorDetailBlocks(major) {
      ensureMajorDetailBlocks(major);
      if (!major.detailHtml) {
        major.detailHtml = (major.detailBlocks || []).map((block) => block.type === "image" && block.url ? `<img src="${block.url}" alt="">` : `<p>${block.text || ""}</p>`).join("");
      }
      return `<div class="subhead"><h3>专业详情内容</h3></div>
      <div class="rich-editor">
        <div class="rich-toolbar">
          <button class="btn ghost" type="button" id="insertDetailImage">插入图片</button>
          <span class="hint">建议详情图宽 750px，单张不超过 4MB。</span>
          <input class="rich-file" id="detailImageInput" type="file" accept="image/*">
        </div>
        <div class="rich-area" id="majorDetailEditor" contenteditable="true">${major.detailHtml || ""}</div>
      </div>`;
    }

    function renderSchoolDetailEditor(school) {
      if (!school.detailHtml) {
        school.detailHtml = `${school.detail ? `<p>${school.detail}</p>` : ""}${school.detailImageUrl ? `<img src="${school.detailImageUrl}" alt="">` : ""}`;
      }
      return `<div class="subhead"><h3>学校介绍内容</h3></div>
      <div class="form-grid">
        <label>介绍框高度(px)<input data-school="detailBoxHeight" placeholder="例如 420"></label>
      </div>
      <div class="rich-editor">
        <div class="rich-toolbar">
          <button class="btn ghost" type="button" id="insertSchoolImage">插入图片</button>
          <span class="hint">文字和图片都在这个框里编辑。</span>
          <input class="rich-file" id="schoolImageInput" type="file" accept="image/*">
        </div>
        <div class="rich-area" id="schoolDetailEditor" contenteditable="true">${school.detailHtml || ""}</div>
      </div>`;
    }

    function renderOrg() {
      content.innerHTML = `<div class="panel">
        <div class="form-grid">
          <label>机构名称<input data-field="name"></label>
          <label>首页简介<input data-field="desc"></label>
        </div>
        ${imageBox("bannerImageUrl", "首页 Banner 图片", site.org.bannerImageUrl, "", "建议图片宽 750px，高 360px，单张不超过 4MB。")}
        ${imageBox("backgroundImageUrl", "页面背景图片", site.org.backgroundImageUrl, "", "建议图片宽 750px，高 1334px，单张不超过 4MB。")}
      </div>`;
      bindInputs(content, site.org, ["name", "desc"]);
      bindImageBoxes(content, () => site.org);
    }

    function renderTeachers() {
      const item = site.teachers[selected.teacher] || site.teachers[0];
      content.innerHTML = `<div class="grid">
        <div class="panel">
          <div class="actions"><button class="btn ghost" id="addTeacher">新增规划师</button></div>
          ${list(site.teachers, selected.teacher, "teacher")}
        </div>
        <div class="panel">
          ${item ? `<div class="form-grid">
            <label>头像简称<input data-field="avatar"></label>
            <label>姓名<input data-field="name"></label>
            <label>岗位方向<input data-field="title"></label>
          </div>
          ${imageBox("avatarUrl", "规划师头像", item.avatarUrl, "", "建议图片宽 400px，高 400px，单张不超过 4MB。")}
          <label>一句话介绍<textarea data-field="desc"></textarea></label>
          <label>详细介绍<textarea data-field="detail"></textarea></label>
          ${imageBox("detailImageUrl", "规划师详情图片", item.detailImageUrl, "", "建议图片宽 750px，高 500px，单张不超过 4MB。")}
          <label>擅长方向，用逗号分隔<input data-field="strengths" data-array="true"></label>
          <div class="actions"><button class="btn danger" id="delTeacher">删除当前规划师</button></div>` : `<div class="hint">请新增规划师</div>`}

        if (!input) return;

          object[field] = input.dataset.array === "true" ? split(input.value) : input.value;

      content.querySelectorAll("[data-pick]").forEach((button) => {
        button.onclick = () => {
          selected[button.dataset.pick] = Number(button.dataset.index);
          if (button.dataset.pick === "category") { selected.school = 0; selected.major = 0; }
          if (button.dataset.pick === "school") selected.major = 0;
          render();
        };
      });
    }

    document.querySelectorAll(".tab").forEach((button) => {
      button.onclick = () => { tab = button.dataset.tab; render(); };
    });
    $("#loginBtn").onclick = login;
    $("#password").onkeydown = (event) => { if (event.key === "Enter") login(); };
    $("#saveBtn").onclick = save;
    if (location.protocol === "file:") {
      $("#fileWarningLogin")?.classList.remove("hidden");
      $("#fileWarningApp")?.classList.remove("hidden");
    }
    if (token) load();
  </script>
</body>
</html>
